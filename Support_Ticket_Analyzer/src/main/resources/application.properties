spring.application.name=Support_Ticket_Analyzer

# Database Connection
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:ticket_management_db}?useSSL=false&serverTimezone=UTC
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASSWORD:your_local_password}

# Hibernate properties to auto-create/update tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect