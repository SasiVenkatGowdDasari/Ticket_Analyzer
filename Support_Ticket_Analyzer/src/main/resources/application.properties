spring.application.name=Support_Ticket_Analyzer

# Database Connection
spring.datasource.url=jdbc:mysql://localhost:3306/ticket_management_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=YOUR_DB_PASSWORD

# Hibernate properties to auto-create/update tables
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect