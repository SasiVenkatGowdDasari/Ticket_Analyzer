<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Tickets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <a href="index.html">← Back Home</a>
        <h2>All Support Tickets</h2>
        
        <div id="ticketContainer">
            <p>Loading tickets...</p>
        </div>
    </div>

    <script>
        async function fetchTickets() {
            try {
                const response = await fetch('https://your-backend-service-name.onrender.com/api/tickets');
                const tickets = await response.json();
                
                const container = document.getElementById('ticketContainer');
                container.innerHTML = '';

                if (tickets.length === 0) {
                    container.innerHTML = '<p>No tickets found.</p>';
                    return;
                }

                tickets.forEach(ticket => {
                    const ticketCard = `
                        <div class="ticket-card">
                            <h3>#${ticket.id} - ${ticket.issueTitle}</h3>
                            <p><strong>Status:</strong> ${ticket.status}</p>
                            <p><strong>Customer:</strong> ${ticket.customerName}</p>
                            <div class="nav-buttons">
                                <a href="ticket-details.html?id=${ticket.id}">View Details</a>
                            </div>
                        </div>
                    `;
                    container.innerHTML += ticketCard;
                });
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('ticketContainer').innerHTML = '<p>Failed to load tickets.</p>';
            }
        }

        fetchTickets();
    </script>
</body>
</html>
